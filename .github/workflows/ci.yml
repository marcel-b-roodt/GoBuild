name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: GDScript Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gdtoolkit
        run: pip install gdtoolkit

      - name: Syntax check (gdparse)
        run: |
          mapfile -t SCRIPTS < <(find addons tests -name "*.gd")
          echo "Checking ${#SCRIPTS[@]} file(s)..."
          gdparse "${SCRIPTS[@]}"

      - name: Lint check (gdlint)
        run: |
          mapfile -t SCRIPTS < <(find addons tests -name "*.gd")
          gdlint "${SCRIPTS[@]}"

  test:
    name: GdUnit4 Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GdUnit4 tests (headless Godot)
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: "4.3"
          godot-status: "stable"
          version: "v6.0.0"
          paths: |
            res://tests
          timeout: 600
          report-name: test-report

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/
