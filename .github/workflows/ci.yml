name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: GdUnit4 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GdUnit4 tests (headless Godot)
        uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: "4.3"
          godot-status: "stable"
          version: "latest"
          paths: |
            res://tests
          timeout: 600
          report-name: test-report

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/
